<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader — Vangrapf</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #1e1e1e;
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff0050, #ff9900);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-top: 0;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #aaa;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .input-group input {
            flex: 1;
            background: #2c2c2c;
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus {
            border: 1px solid #ff9900;
        }
        button {
            background: #ff9900;
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            font-weight: bold;
            color: #0a0a0a;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        button:hover {
            background: #ffaa22;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .progress-bar {
            width: 100%;
            background: #2c2c2c;
            border-radius: 20px;
            margin: 20px 0 10px;
            overflow: hidden;
            height: 8px;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ff9900;
            transition: width 0.2s;
        }
        .status {
            background: #2c2c2c;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 12px;
            text-align: center;
            word-break: break-word;
        }
        .error {
            background: #441111;
            color: #ff8888;
        }
        hr {
            border-color: #2c2c2c;
            margin: 15px 0;
        }
        label {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 4px;
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Vangrapf YouTube Downloader</h1>
    <div class="sub">Вставьте ссылку на YouTube видео</div>

    <label>🔧 Прокси сервер (должен поддерживать /download POST)</label>
    <div class="input-group">
        <input type="text" id="proxyInput" placeholder="https://a42297-c0b0.q.d-f.pw" value="https://a42297-c0b0.q.d-f.pw">
    </div>

    <label>🎬 Ссылка на видео</label>
    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        <button id="downloadBtn">Скачать</button>
    </div>

    <div class="progress-bar" id="progressContainer" style="display: none;">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="statusMsg" class="status"></div>
</div>

<script>
    // DOM элементы
    const proxyInput = document.getElementById('proxyInput');
    const urlInput = document.getElementById('videoUrl');
    const downloadBtn = document.getElementById('downloadBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const statusDiv = document.getElementById('statusMsg');

    // Парсим URL параметры ?url=... и ?proxy=...
    const urlParams = new URLSearchParams(window.location.search);
    const initialUrl = urlParams.get('url');
    const initialProxy = urlParams.get('proxy');
    if (initialUrl && initialUrl.trim()) urlInput.value = initialUrl.trim();
    if (initialProxy && initialProxy.trim()) proxyInput.value = initialProxy.trim();

    function showStatus(msg, isError = false) {
        statusDiv.innerText = msg;
        statusDiv.classList.toggle('error', isError);
    }

    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    async function downloadVideo() {
        const url = urlInput.value.trim();
        const proxy = proxyInput.value.trim();

        if (!url) {
            showStatus('Введите ссылку на YouTube видео', true);
            return;
        }
        if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
            showStatus('Поддерживаются только ссылки YouTube', true);
            return;
        }
        if (!proxy) {
            showStatus('Укажите прокси сервер (например, https://a42297-c0b0.q.d-f.pw)', true);
            return;
        }

        downloadBtn.disabled = true;
        progressContainer.style.display = 'block';
        progressFill.style.width = '0%';
        showStatus('Отправка запроса к прокси...');

        // Нормализуем прокси (убираем слеш в конце)
        const baseProxy = proxy.replace(/\/$/, '');
        const downloadEndpoint = `${baseProxy}/download`;

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 60000); // 60 сек таймаут
            const response = await fetch(downloadEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url }),
                signal: controller.signal
            });
            clearTimeout(timeout);

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText.slice(0, 100)}`);
            }

            const contentLength = response.headers.get('content-length');
            const total = contentLength ? parseInt(contentLength, 10) : 0;
            const reader = response.body.getReader();
            const chunks = [];
            let received = 0;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                received += value.length;
                if (total) {
                    const percent = (received / total) * 100;
                    progressFill.style.width = `${percent}%`;
                    showStatus(`Загрузка: ${Math.round(percent)}% (${formatBytes(received)} / ${formatBytes(total)})`);
                } else {
                    showStatus(`Загружено: ${formatBytes(received)}`);
                }
            }

            const blob = new Blob(chunks);
            const contentDisposition = response.headers.get('content-disposition');
            let filename = 'youtube_video.mp4';
            if (contentDisposition) {
                const match = contentDisposition.match(/filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/);
                if (match && match[1]) filename = match[1].replace(/['"]/g, '');
            }
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
            showStatus(`✅ Готово! ${filename} (${formatBytes(blob.size)})`);
        } catch (err) {
            let errorMsg = err.message;
            if (err.name === 'AbortError') errorMsg = 'Таймаут соединения. Прокси не отвечает.';
            else if (err.message.includes('Failed to fetch')) errorMsg = 'Не удалось соединиться с прокси. Проверьте URL прокси и CORS.';
            showStatus(`Ошибка: ${errorMsg}`, true);
            console.error(err);
        } finally {
            downloadBtn.disabled = false;
            progressContainer.style.display = 'none';
            progressFill.style.width = '0%';
        }
    }

    downloadBtn.addEventListener('click', downloadVideo);
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') downloadVideo();
    });
    proxyInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') downloadVideo();
    });

    // Автозапуск если есть параметр url и proxy (или хотя бы url)
    if (initialUrl) {
        setTimeout(() => downloadVideo(), 200);
    }
</script>
</body>
</html>
